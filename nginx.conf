# ==========================================================================
# Jeffrey Dan Ross - Custom Nginx Configuration
# High performance, Gzip compression, static caching, and clean routing rules.
# ==========================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Performance optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        text/javascript 
        image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Clean URLs: enables loading /experience instead of /experience.html
        location / {
            try_files $uri $uri.html $uri/ =404;
        }

        # Fallback 404 routing
        error_page 404 /404.html;

        # Cache Control for CSS and JS (Forces revalidation on updates)
        location ~* \.(js|css)$ {
            add_header Cache-Control "no-cache, public, must-revalidate";
            access_log off;
        }

        # Cache Control for media assets & documents (Aggressive 30-day cache)
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|pdf)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
    }
}
